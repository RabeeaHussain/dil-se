<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dil Se - Mental Wellness Companion{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1> Dil Se</h1>
                <p class="tagline">From the Heart</p>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Home</a>
                <a href="/chat" class="nav-link {% if request.path == '/chat' %}active{% endif %}">Chat</a>
                <a href="/exercises" class="nav-link {% if request.path == '/exercises' %}active{% endif %}">Exercises</a>
                <a href="/journal" class="nav-link {% if request.path == '/journal' %}active{% endif %}">Journal</a>
            </div>
            <div class="nav-controls">
                <a href="/auth?mode=login" class="nav-auth-btn nav-auth-btn-secondary">Login</a>
                <a href="/auth?mode=signup" class="nav-auth-btn nav-auth-btn-primary">Sign up</a>
                <select id="languageToggle" class="language-select">
                    <option value="english">English</option>
                    <option value="hinglish">Hinglish</option>
                </select>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Dil Se © 2026 | A safe space for mental wellness</p>
        <p class="crisis-notice">In crisis? Call: Pakistan Crisis Helpline 0345-5000-500</p>
    </footer>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
