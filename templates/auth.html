<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dil Se – Sign In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background: linear-gradient(160deg, var(--primary-blue, #e8f0fe) 0%, #f5f0ff 100%);
        }

        .auth-card {
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid rgba(74, 123, 200, 0.15);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(26, 42, 74, 0.08);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo-icon {
            width: 60px;
            height: 60px;
            background: var(--primary-blue, #e8f0fe);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 0.75rem;
        }

        .auth-logo h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--deep-blue, #1a2a4a);
            margin: 0;
        }

        .auth-logo p {
            font-size: 13px;
            color: #6b7a99;
            margin-top: 4px;
        }

        .auth-tabs {
            display: flex;
            background: #f0f4ff;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 1.75rem;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 9px;
            font-size: 14px;
            font-weight: 500;
            color: #6b7a99;
            cursor: pointer;
            border-radius: 9px;
            border: none;
            background: transparent;
            transition: all 0.2s;
        }

        .auth-tab.active {
            background: white;
            color: var(--deep-blue, #1a2a4a);
            border: 1px solid rgba(74, 123, 200, 0.2);
        }

        .auth-form-group {
            margin-bottom: 1rem;
        }

        .auth-form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--deep-blue, #1a2a4a);
            margin-bottom: 6px;
        }

        .auth-form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d0d8f0;
            border-radius: 10px;
            font-size: 14px;
            color: var(--deep-blue, #1a2a4a);
            background: white;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .auth-form-group input:focus {
            border-color: #4a7bc8;
            box-shadow: 0 0 0 3px rgba(74, 123, 200, 0.12);
        }

        .lang-group {
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            flex: 1;
            padding: 9px;
            border: 1px solid #d0d8f0;
            border-radius: 10px;
            background: white;
            font-size: 13px;
            color: #6b7a99;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.selected {
            border-color: #4a7bc8;
            background: var(--primary-blue, #e8f0fe);
            color: var(--deep-blue, #1a2a4a);
            font-weight: 500;
        }

        .btn-auth {
            width: 100%;
            padding: 12px;
            background: var(--deep-blue, #1a2a4a);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-auth:hover { opacity: 0.88; }
        .btn-auth:active { transform: scale(0.98); }

        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-divider {
            text-align: center;
            font-size: 12px;
            color: #6b7a99;
            margin: 1.25rem 0;
            position: relative;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 43%;
            height: 1px;
            background: #d0d8f0;
        }

        .auth-divider::before { left: 0; }
        .auth-divider::after { right: 0; }

        .btn-anon {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid #d0d8f0;
            border-radius: 12px;
            font-size: 13px;
            color: #6b7a99;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-anon:hover { background: #f0f4ff; }

        .auth-success {
            display: none;
            padding: 10px 14px;
            background: #e6f7f2;
            border-radius: 10px;
            color: #1a6e50;
            font-size: 13px;
            margin-top: 1rem;
            text-align: center;
            border: 1px solid #a3d9c5;
        }

        .auth-error {
            display: none;
            padding: 10px 14px;
            background: #fdf0f0;
            border-radius: 10px;
            color: #a32d2d;
            font-size: 13px;
            margin-top: 1rem;
            text-align: center;
            border: 1px solid #f09595;
        }

        .auth-panel { display: none; }
        .auth-panel.active { display: block; }

        .auth-note {
            font-size: 12px;
            color: #6b7a99;
            text-align: center;
            margin-top: 1.25rem;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">

            <div class="auth-logo">
                <div class="auth-logo-icon">💙</div>
                <h1>Dil Se</h1>
                <p>Your mental wellness companion</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Sign in</button>
                <button class="auth-tab" onclick="switchTab('signup')">Create account</button>
            </div>

            <!-- Login Panel -->
            <div id="loginPanel" class="auth-panel active">
                <div class="auth-form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="username" />
                </div>
                <button class="btn-auth" onclick="handleLogin()" id="loginBtn">Sign in</button>
                <div class="auth-divider">or</div>
                <button class="btn-anon" onclick="handleAnon()">Continue anonymously</button>
                <div id="loginError" class="auth-error"></div>
            </div>

            <!-- Signup Panel -->
            <div id="signupPanel" class="auth-panel">
                <div class="auth-form-group">
                    <label for="signupUsername">Username</label>
                    <input type="text" id="signupUsername" placeholder="Choose a username" autocomplete="username" />
                </div>
                <div class="auth-form-group">
                    <label for="signupEmail">Email <span style="color:#6b7a99; font-weight:400;">(optional)</span></label>
                    <input type="email" id="signupEmail" placeholder="your@email.com" autocomplete="email" />
                </div>
                <div class="auth-form-group">
                    <label>Language preference</label>
                    <div class="lang-group">
                        <button class="lang-btn selected" onclick="selectLang(this, 'english')">English</button>
                        <button class="lang-btn" onclick="selectLang(this, 'hinglish')">Hinglish</button>
                    </div>
                </div>
                <button class="btn-auth" onclick="handleSignup()" id="signupBtn">Create account</button>
                <div id="signupSuccess" class="auth-success">Account created! Taking you home...</div>
                <div id="signupError" class="auth-error"></div>
            </div>

            <p class="auth-note">A safe space, just for you 🌸</p>
        </div>
    </div>

    <script>
        let selectedLang = 'english';

        function switchTab(tab) {
            const isLogin = tab === 'login';
            const url = new URL(window.location.href);
            url.searchParams.set('mode', isLogin ? 'login' : 'signup');
            window.history.replaceState({}, '', url);
            document.querySelectorAll('.auth-tab').forEach((t, i) => {
                t.classList.toggle('active', isLogin ? i === 0 : i === 1);
            });
            document.getElementById('loginPanel').classList.toggle('active', isLogin);
            document.getElementById('signupPanel').classList.toggle('active', !isLogin);
        }

        function initializeAuthMode() {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode');
            if (mode === 'signup') {
                switchTab('signup');
            } else {
                switchTab('login');
            }
        }

        function selectLang(btn, lang) {
            selectedLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const errEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');
            errEl.style.display = 'none';

            if (!username) {
                errEl.textContent = 'Please enter your username.';
                errEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('userId', data.user_id);

                    localStorage.setItem('language', data.language || 'english');
                    localStorage.setItem('userLanguage', data.language || 'english');

                    if (data.username) {
                        localStorage.setItem('username', data.username);
                    }
                    window.location.href = '/';
                } else {
                    document.getElementById('signupUsername').value = username;
                    switchTab('signup');
                    document.getElementById('signupError').textContent = data.error || 'User not found. Try creating an account.';
                    document.getElementById('signupError').style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Sign in';
                }
            } catch (e) {
                errEl.textContent = 'Could not connect. Please try again.';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign in';
            }
        }

        async function handleSignup() {
            const username = document.getElementById('signupUsername').value.trim();
            const successEl = document.getElementById('signupSuccess');
            const errEl = document.getElementById('signupError');
            const btn = document.getElementById('signupBtn');
            successEl.style.display = 'none';
            errEl.style.display = 'none';

            if (!username) {
                errEl.textContent = 'Please choose a username.';
                errEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const res = await fetch('/api/user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, language: selectedLang })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('userId', data.user_id);

                    localStorage.setItem('language', data.language || 'english');
                    localStorage.setItem('userLanguage', data.language || 'english');

                    if (data.username) {
                        localStorage.setItem('username', data.username);
                    }
                    successEl.style.display = 'block';
                    setTimeout(() => window.location.href = '/', 1200);
                } else {
                    errEl.textContent = data.error || 'Could not create account. Try a different username.';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Create account';
                }
            } catch (e) {
                errEl.textContent = 'Could not connect. Please try again.';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Create account';
            }
        }

        async function handleAnon() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Entering...';
            try {
                const res = await fetch('/api/user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ language: 'english' })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('userId', data.user_id);

                    localStorage.setItem('language', data.language || 'english');
                    localStorage.setItem('userLanguage', data.language || 'english');

                    if (data.username) {
                        localStorage.setItem('username', data.username);
                    }
                    window.location.href = '/';
                }
            } catch (e) {
                btn.disabled = false;
                btn.textContent = 'Continue anonymously';
            }
        }

        document.addEventListener('DOMContentLoaded', initializeAuthMode);

        // Allow Enter key to submit
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('loginPanel').classList.contains('active')) {
                    handleLogin();
                } else {
                    handleSignup();
                }
            }
        });
    </script>
</body>
</html>
